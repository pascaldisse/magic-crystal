[package]
name = "scrying-glass"
version = "0.1.0"
edition = "2024"
description = "the Scrying Glass — DreamForge native window spirit (Tauri + wgpu); a screenshot is a scrying"
license = "MIT"

[build-dependencies]
tauri-build = "2.6.3"

[dependencies]
bytemuck = { version = "1.24.0", features = ["derive"] }
crystal = { path = "../../crates/crystal" }
elements = { path = "../elements" }
fracture = { path = "../fracture" }
glam = "0.30.9"
kami = { path = "../kami" }
png = "0.17.16"
pollster = "0.4.0"
raw-window-handle = "0.6.2"
serde = "1"
serde_json = "1"
transmutation = { path = "../transmute" }
vessel = { path = "../vessel" }
homunculus = { path = "../homunculus" }
sama = { path = "../sama" }
tauri = { version = "2.11.5", features = ["macos-private-api", "unstable"] }
wgpu = "30.0.0"

[dev-dependencies]
aether = { path = "../aether" }
pleroma = { path = "../pleroma" }
wired = { path = "../wired" }
tokio = { version = "1", features = ["full"] }

[[example]]
name = "n2_presence"
path = "examples/n2_presence.rs"

[[example]]
name = "vi2_break"
path = "examples/vi2_break.rs"

[target.'cfg(target_os = "macos")'.dependencies]
block2 = "0.6.2"
objc2-app-kit = { version = "0.3.2", features = ["NSEvent", "NSWindow", "NSCursor"] }
