[package]
name = "scrying-glass"
version = "0.1.0"
edition = "2024"
description = "the Scrying Glass — DreamForge native window spirit (Tauri + wgpu); a screenshot is a scrying"
license = "MIT"

[build-dependencies]
tauri-build = "2.6.3"

[dependencies]
bytemuck = { version = "1.24.0", features = ["derive"] }
crystal = { path = "../../crates/crystal" }
elements = { path = "../elements" }
fracture = { path = "../fracture" }
glam = "0.30.9"
kami = { path = "../kami" }
png = "0.17.16"
pollster = "0.4.0"
raw-window-handle = "0.6.2"
seed = { path = "../seed" }
serde = "1"
serde_json = "1"
steiner = { path = "../steiner" }
transmutation = { path = "../transmute" }
vessel = { path = "../vessel" }
homunculus = { path = "../homunculus" }
sama = { path = "../sama" }
tauri = { version = "2.11.5", features = ["macos-private-api", "unstable"] }
wgpu = "30.0.0"

[dev-dependencies]
half = "2"
aether = { path = "../aether" }
pleroma = { path = "../pleroma" }
wired = { path = "../wired" }
tokio = { version = "1", features = ["full"] }

[[example]]
name = "n2_presence"
path = "examples/n2_presence.rs"

[[example]]
name = "vi2_break"
path = "examples/vi2_break.rs"

[[example]]
name = "vii0_ground"
path = "examples/vii0_ground.rs"

[target.'cfg(target_os = "macos")'.dependencies]
block2 = "0.6.2"
objc2-app-kit = { version = "0.3.2", features = ["NSEvent", "NSWindow", "NSCursor"] }

# NEURAL-LIVE (N0 scaffold — dies at lane cutover): MPSGraph batched-GEMM
# forward on the wgpu Metal device, reached via as_hal. Guarded by
# GAIA_NEURAL_LIVE (dev flag). objc2-metal already transitive via wgpu-hal.
[target.'cfg(target_os = "macos")'.dependencies.objc2-metal-performance-shaders-graph]
version = "0.3.2"
features = [
  "MPSGraph", "MPSGraphCore", "MPSGraphTensor", "MPSGraphOperation",
  "MPSGraphDevice", "MPSGraphMemoryOps", "MPSGraphMatrixMultiplicationOps",
  "MPSGraphArithmeticOps", "MPSGraphActivationOps", "MPSGraphTensorData",
  "MPSGraphExecutable",
  "objc2-metal-performance-shaders",
]

[target.'cfg(target_os = "macos")'.dependencies.objc2-metal-performance-shaders]
version = "0.3.2"
# S5 (kill the encode wall): MPSMatrix + MPSMatrixMultiplication give a raw
# per-layer GEMM chain on our own command buffer (µs-class CPU encode), the
# metal4-probe pattern minus MPSGraph's per-frame CPU cost.
features = [
  "MPSCore", "MPSCoreTypes", "MPSNDArray", "MPSCommandBuffer",
  "MPSMatrix", "MPSMatrixMultiplication", "MPSMatrixTypes",
]

[target.'cfg(target_os = "macos")'.dependencies.objc2-metal]
version = "0.3.2"
# S5: raw compute encoder + library for the fused bias+ReLU kernel between GEMMs.
# S12: MTLEvent adds the dedicated-net-queue → render-queue fence (MTLSharedEvent).
features = [
  "MTLDevice", "MTLCommandQueue", "MTLBuffer", "MTLResource", "MTLCommandBuffer",
  "MTLComputePipeline", "MTLComputeCommandEncoder", "MTLCommandEncoder",
  "MTLLibrary", "MTLTypes", "MTLEvent",
]

[target.'cfg(target_os = "macos")'.dependencies.objc2]
version = "0.6"

[target.'cfg(target_os = "macos")'.dependencies.objc2-foundation]
version = "0.3.2"
features = ["NSArray", "NSData", "NSDictionary", "NSString", "NSValue"]
