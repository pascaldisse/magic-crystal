[package]
name = "oracle"
version = "0.1.0"
edition = "2021"
description = "the Oracle — the senses of the Crystal: pull-only, data-space looking over the ECS (no GPU, no rendering); looking is a verb"
license = "MIT"

[lib]
name = "oracle"
path = "src/lib.rs"

[[bin]]
name = "oracle-cli"
path = "src/bin/oracle_cli.rs"

[dependencies]
crystal = { path = "../../crates/crystal" }
serde = { version = "1", features = ["derive"] }
vessel = { path = "../vessel" }
glam = "0.30.9"
serde_json = "1"

[dev-dependencies]
# VI-2 same-wave canon ordeal only (dev-only: the oracle crate proper stays
# physics/geometry-agnostic). `fracture` depends on `elements` + `transmutation`
# + `crystal`, never on `oracle` or `scrying-glass` — no cycle either way.
elements = { path = "../elements" }
fracture = { path = "../fracture" }
