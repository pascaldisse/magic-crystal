[package]
name = "oracle"
version = "0.1.0"
edition = "2021"
description = "the Oracle — the senses of the Crystal: pull-only, data-space looking over the ECS (no GPU, no rendering); looking is a verb"
license = "MIT"

[lib]
name = "oracle"
path = "src/lib.rs"

[[bin]]
name = "oracle-cli"
path = "src/bin/oracle_cli.rs"

[dependencies]
crystal = { path = "../../crates/crystal" }
serde = { version = "1", features = ["derive"] }
vessel = { path = "../vessel" }
glam = "0.30.9"
serde_json = "1"

[dev-dependencies]
# GUARDIAN RULING F6 — senses read SOLVER TRUTH. `rest_pose_canon.rs` ticks the
# realm's physics to rest through scrying-glass, then gazes at the RESTED ECS
# with the oracle's own eyes. oracle and scrying-glass are SIBLINGS (both depend
# only on `crystal`, which depends back on neither) — scrying-glass never depends
# on oracle, so this dev-dep carries ZERO cycle risk. Tests-only surface.
scrying-glass = { path = "../scrying-glass" }
