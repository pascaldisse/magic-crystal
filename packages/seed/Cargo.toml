[package]
name = "seed"
version = "0.1.0"
edition = "2021"
description = "DreamForge procedural substrate: deterministic hash streams, noise fields, and scatter (the foliage-as-density groundwork)"
license = "MIT"

[dependencies]
glam = "0.30.9"
# VII-0b — the `terrain` realm sigil (`terrain_sigil.rs`) is parsed straight
# off realm JSON, `deny_unknown_fields` like the `body` sigil.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# RITE VII "THE PLANET-WALKER" VII-0: seed produces the terrain patch, then
# hands it to transmute (seed -> transmute -> jormungandr -> embodiment, per
# docs/proposals/RITE-VII-THE-PLANET-WALKER.md "The chain"). No cycle: as of
# this writing `transmutation`'s own Cargo.toml depends only on meshopt,
# metis, bytemuck, serde, bincode — nothing in the workspace, so seed ->
# transmutation is a plain forward edge. `default-features = false` here only
# controls the METIS native build (vendored C partitioner) for invocations
# scoped to seed alone (e.g. `cargo build -p seed`, `cargo test -p seed`) —
# seed itself only needs the unconditional Mesh/Vertex struct shapes from
# mesh.rs. It does NOT skip METIS workspace-wide: `jormungandr` and
# `scrying-glass` both depend on `transmutation` with default features on, so
# a `--workspace` (or any build that also builds one of them) still unifies
# features and compiles transmutation with METIS regardless of this line.
transmutation = { path = "../transmute", default-features = false }
